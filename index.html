<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>To-Do APP</title>
  <style>
    body {
      font-family: Arial;
      background: #f4f4f4;
      text-align: center;
      margin-top: 50px;
    }

    .container {
      background: white;
      padding: 20px;
      width: 300px;
      margin: auto;
      border-radius: 10px;
      box-shadow: 0 0 10px gray;
    }

    input {
      width: 70%;
      padding: 10px;
    }

    button {
      padding: 10px;
      cursor: pointer;
    }

    ul {
      list-style: none;
      padding: 0;
    }

    li {
      padding: 10px;
      margin-top: 5px;
      background: #eee;
      display: flex;
      justify-content: space-between;
      cursor: pointer;
    }

    .completed {
      text-decoration: line-through;
      color: gray;
    }

    .delete {
      color: red;
      cursor: pointer;
    }
  </style>
</head>
<body>

  <div class="container">
    <h2>To-Do List</h2>
    
    <input type="text" id="taskInput" placeholder="Enter task">
    <button id="addBtn">Add</button>

    <ul id="taskList"></ul>
  </div>

  <!-- Link JS file -->
  <script src="script.js"></script>

</body>
</html>
